name = "spoof-demo"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# Pages deploy (static + /api Functions):
#   npx wrangler pages deploy . --project-name=spoof-demo
#
# Pages secrets:
#   npx wrangler pages secret put MAILGUN_API_KEY --project-name=spoof-demo
#   npx wrangler pages secret put MAILGUN_DOMAIN --project-name=spoof-demo
#   npx wrangler pages secret put RESEND_API_KEY --project-name=spoof-demo
#   npx wrangler pages secret put ALLOWED_ORIGINS --project-name=spoof-demo
#
# Standalone worker deploy (optional):
#   npx wrangler deploy worker/src/index.js --name=spoof-demo-api

[vars]
ENVELOPE_FROM = "Network26 Spoof Demo <demo@mail.network26.com>"

# Optional KV for rate limiting
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "YOUR_KV_NAMESPACE_ID"